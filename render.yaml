services:
  - type: web
    name: transitops-api
    runtime: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: transitops-db
    databaseName: transitops
    user: postgres
    plan: free
